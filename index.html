<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Locals</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f0f0f;
color:white;
margin:0;
padding:0;
}

header{
background:#1a1a1a;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

form{
background:#1e1e1e;
padding:20px;
border-radius:8px;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border-radius:5px;
border:none;
}

button{
background:#ff9800;
border:none;
padding:12px;
color:white;
font-weight:bold;
cursor:pointer;
border-radius:5px;
width:100%;
}

button:hover{
background:#ffb74d;
}

.listings{
margin-top:40px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

</style>

</head>

<body>

<header>
Welcome Locals
</header>

<div class="container">

<h2>Add a Local Spot</h2>

<form id="listingForm">

<label>Title</label>
<input id="title" required>

<label>Description</label>
<textarea id="description" required></textarea>

<label>City</label>
<input id="city" required>

<label>Category</label>
<select id="category">
<option value="Restaurant">Restaurant</option>
<option value="Cafe">Cafe</option>
<option value="Bar">Bar</option>
<option value="Activity">Activity</option>
<option value="Attraction">Attraction</option>
</select>

<button type="submit">Submit Listing</button>

</form>

<div class="listings">

<h2>Local Listings</h2>

<div id="listingsContainer"></div>

</div>

</div>

<!-- Firebase script -->
<script type="module" src="script.js"></script>

</body>
</html>
