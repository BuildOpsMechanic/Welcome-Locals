<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Locals</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f0f0f;
color:white;
margin:0;
padding:0;
}

header{
background:#1a1a1a;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom:1px solid #333;
}

.page-layout{
display:flex;
gap:20px;
max-width:1400px;
margin:auto;
padding:30px;
align-items:flex-start;
}

.left-panel{
flex:0 0 420px;
display:flex;
flex-direction:column;
gap:20px;
}

.right-panel{
flex:1;
min-height:600px;
}

.panel-box{
background:#1e1e1e;
padding:20px;
border-radius:10px;
}

h2{
margin-top:0;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:5px;
border:none;
box-sizing:border-box;
}

button{
background:#ff9800;
border:none;
padding:12px;
color:white;
font-weight:bold;
cursor:pointer;
border-radius:5px;
width:100%;
margin-bottom:10px;
}

button:hover{
background:#ffb74d;
}

.secondary-button{
background:#555;
}

.secondary-button:hover{
background:#777;
}

.results-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
gap:10px;
flex-wrap:wrap;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
margin-bottom:15px;
border:1px solid #2f2f2f;
}

.empty-state{
background:#1e1e1e;
padding:25px;
border-radius:10px;
color:#cfcfcf;
}

.language-group{
background:#171717;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

@media (max-width: 1000px){
.page-layout{
flex-direction:column;
}

.left-panel,
.right-panel{
width:100%;
flex:1 1 auto;
}
}
</style>
</head>

<body>

<header>
Welcome Locals
</header>

<div class="page-layout">

<div class="left-panel">

<div class="panel-box">

<h2>Add a Local Spot</h2>

<form id="listingForm">

<label>Title</label>
<input id="title" required>

<label>Description</label>
<textarea id="description" required></textarea>

<label>City</label>
<input id="city" required>

<label>Category</label>
<select id="category" required>
<option value="Restaurant">Restaurant</option>
<option value="Cafe">Cafe</option>
<option value="Bar">Bar</option>
<option value="Activity">Activity</option>
<option value="Attraction">Attraction</option>
</select>

<div class="language-group">
<label>Primary Language</label>
<select id="primaryLanguage" required>
<option value="">Select primary language</option>
<option value="English">English</option>
<option value="Mandarin Chinese">Mandarin Chinese</option>
<option value="Hindi">Hindi</option>
<option value="Spanish">Spanish</option>
<option value="French">French</option>
<option value="Modern Standard Arabic">Modern Standard Arabic</option>
<option value="Bengali">Bengali</option>
<option value="Portuguese">Portuguese</option>
<option value="Russian">Russian</option>
<option value="Urdu">Urdu</option>
<option value="Indonesian">Indonesian</option>
<option value="German">German</option>
<option value="Japanese">Japanese</option>
<option value="Nigerian Pidgin">Nigerian Pidgin</option>
<option value="Marathi">Marathi</option>
<option value="Telugu">Telugu</option>
<option value="Turkish">Turkish</option>
<option value="Tamil">Tamil</option>
<option value="Vietnamese">Vietnamese</option>
<option value="Korean">Korean</option>
</select>

<label>Secondary Language</label>
<select id="secondaryLanguage">
<option value="">None</option>
<option value="English">English</option>
<option value="Mandarin Chinese">Mandarin Chinese</option>
<option value="Hindi">Hindi</option>
<option value="Spanish">Spanish</option>
<option value="French">French</option>
<option value="Modern Standard Arabic">Modern Standard Arabic</option>
<option value="Bengali">Bengali</option>
<option value="Portuguese">Portuguese</option>
<option value="Russian">Russian</option>
<option value="Urdu">Urdu</option>
<option value="Indonesian">Indonesian</option>
<option value="German">German</option>
<option value="Japanese">Japanese</option>
<option value="Nigerian Pidgin">Nigerian Pidgin</option>
<option value="Marathi">Marathi</option>
<option value="Telugu">Telugu</option>
<option value="Turkish">Turkish</option>
<option value="Tamil">Tamil</option>
<option value="Vietnamese">Vietnamese</option>
<option value="Korean">Korean</option>
</select>

<label>Tertiary Language</label>
<select id="tertiaryLanguage">
<option value="">None</option>
<option value="English">English</option>
<option value="Mandarin Chinese">Mandarin Chinese</option>
<option value="Hindi">Hindi</option>
<option value="Spanish">Spanish</option>
<option value="French">French</option>
<option value="Modern Standard Arabic">Modern Standard Arabic</option>
<option value="Bengali">Bengali</option>
<option value="Portuguese">Portuguese</option>
<option value="Russian">Russian</option>
<option value="Urdu">Urdu</option>
<option value="Indonesian">Indonesian</option>
<option value="German">German</option>
<option value="Japanese">Japanese</option>
<option value="Nigerian Pidgin">Nigerian Pidgin</option>
<option value="Marathi">Marathi</option>
<option value="Telugu">Telugu</option>
<option value="Turkish">Turkish</option>
<option value="Tamil">Tamil</option>
<option value="Vietnamese">Vietnamese</option>
<option value="Korean">Korean</option>
</select>
</div>

<button type="submit">Submit Listing</button>

</form>

</div>

<div class="panel-box">

<h2>Filter Listings</h2>

<label>City</label>
<input id="filterCity" placeholder="Enter city">

<label>Category</label>
<select id="filterCategory">
<option value="">All Categories</option>
<option value="Restaurant">Restaurant</option>
<option value="Cafe">Cafe</option>
<option value="Bar">Bar</option>
<option value="Activity">Activity</option>
<option value="Attraction">Attraction</option>
</select>

<label>Language</label>
<select id="filterLanguage">
<option value="">All Languages</option>
<option value="English">English</option>
<option value="Mandarin Chinese">Mandarin Chinese</option>
<option value="Hindi">Hindi</option>
<option value="Spanish">Spanish</option>
<option value="French">French</option>
<option value="Modern Standard Arabic">Modern Standard Arabic</option>
<option value="Bengali">Bengali</option>
<option value="Portuguese">Portuguese</option>
<option value="Russian">Russian</option>
<option value="Urdu">Urdu</option>
<option value="Indonesian">Indonesian</option>
<option value="German">German</option>
<option value="Japanese">Japanese</option>
<option value="Nigerian Pidgin">Nigerian Pidgin</option>
<option value="Marathi">Marathi</option>
<option value="Telugu">Telugu</option>
<option value="Turkish">Turkish</option>
<option value="Tamil">Tamil</option>
<option value="Vietnamese">Vietnamese</option>
<option value="Korean">Korean</option>
</select>

<button id="searchButton" type="button">Search</button>
<button id="clearFiltersButton" class="secondary-button" type="button">Clear Filters</button>

</div>

</div>

<div class="right-panel">

<div class="results-header">
<h2>Search Results</h2>
<div id="resultsCount">0 listings</div>
</div>

<div id="loadingIndicator" style="display:none;margin-bottom:10px;">
Searching listings...
</div>

<div id="listingsContainer"></div>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
